<groupbox onload="Zhutero_Preferences.init()">
  <label><html:h2>Zhutero Settings</html:h2></label>

  <hbox align="center">
    <label value="LLM Provider:" style="width: 110px;" />
    <menulist id="zhutero-provider" native="true" style="flex: 1;">
      <menupopup>
        <menuitem label="Anthropic (Claude)" value="anthropic" />
        <menuitem label="OpenAI" value="openai" />
        <menuitem label="Custom (OpenAI-compatible)" value="custom" />
      </menupopup>
    </menulist>
  </hbox>

  <hbox id="zhutero-baseurl-row" align="center" hidden="true">
    <label value="Base URL:" style="width: 110px;" />
    <html:input id="zhutero-baseurl" type="text"
                placeholder="https://your-api.example.com/v1"
                style="flex: 1;" />
  </hbox>

  <hbox align="center">
    <label value="API Key:" style="width: 110px;" />
    <html:input id="zhutero-apikey" type="password"
                placeholder="sk-..."
                style="flex: 1;" />
  </hbox>

  <hbox align="center">
    <label value="Model:" style="width: 110px;" />
    <html:input id="zhutero-model" type="text"
                placeholder="Leave blank for default"
                style="flex: 1;" />
  </hbox>

  <label style="font-size: 11px; color: #888; margin-inline-start: 110px;">
    e.g. claude-sonnet-4-20250514, gpt-4o
  </label>

  <label id="zhutero-status" hidden="true"
         style="color: #10b981; font-size: 12px; margin-top: 8px;">
    Settings saved.
  </label>
</groupbox>
